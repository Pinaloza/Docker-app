<!DOCTYPE html>
<html>
<head>
    <title>Bakery Store</title>
</head>
<body>

<h1>Bakery Store</h1>

<a href="/cart">View Cart</a>

<hr>

{% for product in products %}

<div style="border:1px solid #ddd;
padding:15px;
margin:15px;
width:250px;
display:inline-block;">

    <img
      src="{{ url_for('static', filename='images/' + product.image) }}"
      width="220">

    <h3>{{ product.name }}</h3>

    <p>$ {{ product.price }}</p>

    <a href="/add/{{ product.id }}">
        <button>Add To Cart</button>
    </a>

</div>

{% endfor %}

</body>
</html>
